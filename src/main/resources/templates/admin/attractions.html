<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/admin.common :: head}"></head>

<body>
    <link rel="stylesheet" href="/style/admin.form.css">
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar" th:replace="~{fragment/admin.common :: .sidebar}"></aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <header class="top-bar" th:replace="~{fragment/admin.common :: .top-bar}"></header>

            <!-- Page Content -->
            <section class="content">
                <div class="content-header">
                    <h2><i class="fas fa-map-marker-alt"></i> Attractions</h2>
                    <button onclick="openModal()" class="add-btn">
                        <i class="fas fa-plus"></i> Add Attraction</button>
                </div>

                <!-- Data Table -->
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Attraction ID</th>
                            <th>Description</th>
                            <th>image_url</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="attraction : ${attractions}">
                            <td th:text="${attraction.attractionId}"></td>
                            <td th:text="${attraction.attractionDescription}"></td>
                            <td>
                                <img data-th-src="|/attraction/images/${attraction.attractionId}|" width="40">
                            </td>
                            <td>
                                <a th:href="@{/admin/attractions/edit/{id}(id=${attraction.attractionId})}"
                                    class="edit-btn">
                                    <i class="fas fa-edit"></i> Edit
                                </a>
                                <a th:href="@{/admin/attractions/delete/{id}(id=${attraction.attractionId})}"
                                    class="delete-btn"
                                    onclick="return confirm('Are you sure you want to delete this attraction?');">
                                    <i class="fas fa-trash-alt"></i> Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </div>

    <div th:replace="fragment/admin.common :: modal('Add Attractions', ~{::modalContent})"></div>

    <!-- Modal Body Content -->
    <th:block th:fragment="modalContent">
        <form th:action="@{/admin/attractions}" method="post" enctype="multipart/form-data" class="attraction-form">

            <div class="form-group">
                <label for="name"><i class="fas fa-font"></i> Attraction Name</label>
                <input type="text" id="name" name="attractionName" required>
            </div>

            <div class="form-group">
                <label for="description"><i class="fas fa-align-left"></i> Description</label>
                <textarea id="description" name="attractionDescription"></textarea>
            </div>

            <!-- <div class="form-group">
        <label for="country"><i class="fas fa-globe"></i> Country</label>
        <input type="text" id="country" name="country" required>
      </div>

      <div class="form-group">
        <label for="city"><i class="fas fa-city"></i> City</label>
        <input type="text" id="city" name="city" required>
      </div>

      <div class="form-group">
        <label for="price"><i class="fas fa-dollar-sign"></i> Price</label>
        <input type="number" id="price" name="price" step="0.01" required>
      </div> -->

            <div class="form-group">
                <label for="image"><i class="fas fa-image"></i> Image (PNG, JPG)</label>
                <input type="file" name="attractionImageFile" id="attractionImage"
                    accept="image/png, image/jpeg, image/jpg">
            </div>

            <div class="submit-container">
                <button type="submit" class="submit-btn">
                    <i class="fas fa-plus-circle"></i> Add Attraction
                </button>
            </div>

        </form>
        <hr>
        <button onclick="closeModal()">Close</button>
    </th:block>
</body>

</html>

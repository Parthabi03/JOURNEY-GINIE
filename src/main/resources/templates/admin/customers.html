<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/admin.common :: head}"></head>

<body>

    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar" th:replace="~{fragment/admin.common :: .sidebar}"></aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <header class="top-bar" th:replace="~{fragment/admin.common :: .top-bar}"></header>

            <!-- Page Content -->
            <section class="content">
                <div class="content-header">
                    <h2><i class="fas fa-users"></i> Customers</h2>
                </div>

                <!-- Data Table -->
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Location</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="destination : ${destinations}">
                            <td th:text="${destination.id}"></td>
                            <td th:text="${destination.name}"></td>
                            <td th:text="${destination.location}"></td>
                            <td>
                                <a th:href="@{/admin/destinations/edit/{id}(id=${destination.id})}" class="edit-btn">
                                    <i class="fas fa-edit"></i> Edit
                                </a>
                                <a th:href="@{/admin/destinations/delete/{id}(id=${destination.id})}" class="delete-btn"
                                    onclick="return confirm('Are you sure you want to delete this destination?');">
                                    <i class="fas fa-trash-alt"></i> Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </div>

</body>

</html>

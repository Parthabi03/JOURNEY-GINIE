<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/admin.common :: head}"></head>

<body>
  <link rel="stylesheet" href="/style/admin.form.css">
  <link rel="stylesheet" href="/style/multiselect.css">

  <script src="/script/multiselect.js" defer></script>

  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="sidebar" th:replace="~{fragment/admin.common :: .sidebar}"></aside>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Top Bar -->
      <header class="top-bar" th:replace="~{fragment/admin.common :: .top-bar}"></header>

      <!-- Page Content -->
      <section class="content">
        <div class="content-header">
          <h2><i class="fas fa-suitcase-rolling"></i> Tours</a></h2>
          <button onclick="openModal()" class="add-btn">
            <i class="fas fa-plus"></i> Add Tour</button>
        </div>

        <!-- Data Table -->
        <table class="data-table">
          <thead>
            <tr>
              <th>Tour Id </th>
              <th>Tour Title</th>
              <th>Tour Description</th>
              <!-- <th>Place Name</th> -->
              <th>price</th>
              <th>image_url</th>
              <th>actions</th>
              <!-- <th>availability </th>  -->
              <!-- <th>Start Date</th>
              <th>End Date</th>
              <th>User Id</th> -->
            </tr>

          </thead>
          <tbody>
            <tr th:each="tour : ${tours}">
              <td th:text="${tour.id}"></td>
              <td th:text="${tour.title}"></td>
              <td th:text="${tour.description}"></td>
              <!-- <td th:text="${tour.name}"></td> -->
              <td th:text="${tour.price}"></td>
    
              <td>
                <!-- <img data-th-src="|/tour/images/${tour.id}|" width="40"> -->
                <img th:src="@{/tours/images/{id}(id=${tour.id})}" width="40"> 
              </td>
              <td>
                <a th:href="@{/admin/tours/edit/{id}(id=${tour.id})}" class="edit-btn">
                  <i class="fas fa-edit"></i> Edit
                </a>
                <a th:href="@{/admin/tours/delete/{id}(id=${tour.id})}" class="delete-btn"
                  onclick="return confirm('Are you sure you want to delete this tour?');">
                  <i class="fas fa-trash-alt"></i> Delete
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </div>
  </div>

  <div th:replace="fragment/admin.common :: modal('Add Tours', ~{::modalContent})"></div>

  <!-- Modal Body Content -->
  <th:block th:fragment="modalContent">
    <form th:action="@{/admin/tours/add}" method="post" enctype="multipart/form-data" class="tour-form">
      <div class="form-group">

        <label for="title"><i class="fas fa-font"></i> Tour Title</label>
        <input type="text" id="title" name="title" required>
      </div>

      <div class="form-group">
        <label for="description"><i class="fas fa-align-left"></i> Description</label>
        <textarea id="description" name="description"></textarea>
      </div>

      <!-- <div class="form-group">
        <label for="name"><i class="fas fa-globe"></i> Name</label>
        <input type="text" id="name" name="name" required>
      </div> -->

      <div class="form-group">
        <label for="price"><i class="fas fa-dollar-sign"></i> Price</label>
        <input type="number" id="price" name="price" step="0.01" required>
      </div>

      <!-- <div class="form-group">
        <label for="city"><i class="fas fa-city"></i> City</label>
        <input type="text" id="city" name="city" required>
      </div> -->

      <!-- <div class="form-group">
        <label for="image"><i class="fas fa-image"></i> Image (PNG, JPG)</label>
        <input type="file" id="image" name="image" accept=".png, .jpg, .jpeg" required>
      </div> -->

      <div class="form-group">
        <label for="image"><i class="fas fa-image"></i> Image (PNG, JPG)</label>
        <input type="file" id="image" name="image" accept=".png, .jpg, .jpeg" required>
      </div>


      <div class="multiselect-container">
        <div class="select-box" onclick="toggleDropdown()">
          <div class="selected-items" id="selectedItems"></div>
          <span>▼</span>
        </div>

        <div class="options-container" id="optionsContainer">
          <label class="option" data-th-each="destination : ${destinations}">
            <input type="checkbox" name="destination" data-th-value="${destination.destinationId}" onchange="updateSelection(this)">
            <span data-th-text="${destination.destinationName}"></span>
          </label>
        </div>
      </div>

      <div class="submit-container">
        <input type="hidden" name="_csrf" data-th-value="${_csrf.token}">
        <button type="submit" class="submit-btn">
          <i class="fas fa-plus-circle"></i> SUBMIT
        </button>
      </div>

    </form>
    <hr>
    <button onclick="closeModal()">Close</button>
  </th:block>

</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/admin.common :: head}"></head>

<body>
  <link rel="stylesheet" href="/style/admin.form.css">
  <link rel="stylesheet" href="/style/multiselect.css">

  <script src="/script/multiselect.js" defer></script>

  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="sidebar" th:replace="~{fragment/admin.common :: .sidebar}"></aside>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Top Bar -->
      <header class="top-bar" th:replace="~{fragment/admin.common :: .top-bar}"></header>

      <!-- Page Content -->
      <section class="content">
        <div class="content-header">
          <h2><i class="fas fa-suitcase-rolling"></i> Packages</a></h2>
          <button onclick="openModal()" class="add-btn">
            <i class="fas fa-plus"></i> Add Packages </button>
        </div>

        <!-- Data Table -->
        <table class="data-table">
          <thead>
            <tr>
              <th>Package Id </th>
              <th>Package Title</th>
              <th>Package Description</th>
              <th>Place Name</th>
              <th>price</th>
              <th>image_url</th>
              <th>actions</th>
              <!-- <th>availability </th>  -->
              <!-- <th>Start Date</th>
              <th>End Date</th>
              <th>User Id</th> -->
            </tr>

          </thead>
          <tbody>
            <tr th:each="package : ${packages}">
              <td th:text="${package.id}"></td>
              <td th:text="${package.title}"></td>
              <td th:text="${package.description}"></td>
              <td th:text="${package.name}"></td>
              <td th:text="${package.price}"></td>
    
              <td>
                <img data-th-src="|/admin/packages/images/${package.id}|" width="40">
                <!-- <img th:src="@{/packages/images/{id}(id=${package.id})}" width="40"> -->


            </td>

              <td>
                <a th:href="@{/admin/packages/edit/{id}(id=${package.id})}" class="edit-btn">
                  <i class="fas fa-edit"></i> Edit
                </a>
                <a th:href="@{/admin/packages/delete/{id}(id=${package.id})}" class="delete-btn"
                  onclick="return confirm('Are you sure you want to delete this tour?');">
                  <i class="fas fa-trash-alt"></i> Delete
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </div>
  </div>

  <div th:replace="fragment/admin.common :: modal('Add Packages', ~{::modalContent})"></div>

  <!-- Modal Body Content -->
  <th:block th:fragment="modalContent">
    <form th:action="@{/admin/packages}" method="post" enctype="multipart/form-data" class="packages-form">
      <div class="form-group">

        <label for="title"><i class="fas fa-font"></i> Package Title</label>
        <input type="text" id="title" name="title" required>
      </div>

      <div class="form-group">
        <label for="description"><i class="fas fa-align-left"></i> Description</label>
        <textarea id="description" name="description"></textarea>
      </div>

      <div class="form-group">
        <label for="name"><i class="fas fa-globe"></i> Name</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="price"><i class="fas fa-dollar-sign"></i> Price</label>
        <input type="number" id="price" name="price" step="0.01" required>
      </div>

      <div class="form-group">
        <label for="tour"><i class="fas fa-dollar-sign"></i> Tour</label>
        <select name="tour" id="tour">
          <option value="" disabled selected>---Select Tour---</option>
          <option value="" data-th-each="tour:${tours}" data-th-value="${tour.id}" data-th-text="${tour.title}"></option>
        </select>
      </div>

      <div class="form-group">
        <label for="image"><i class="fas fa-image"></i> Image (PNG, JPG)</label>
        <input type="file" id="packagesImageFile" name="packagesImageFile" accept="image/png, image/jpeg, image/jpg">
      </div>


      <!-- <div class="multiselect-container">
        <div class="select-box" onclick="toggleDropdown()">
          <div class="selected-items" id="selectedItems"></div>
          <span>▼</span>
        </div>

        <div class="options-container" id="optionsContainer">
          <label class="option" data-th-each="destination : ${destinations}">
            <input type="checkbox" name="destination" data-th-value="${destination.destinationId}" onchange="updateSelection(this)">
            <span data-th-text="${destination.destinationName}"></span>
          </label>
        </div>
      </div> -->

      <div class="submit-container">
        <button type="submit" class="submit-btn">
          <i class="fas fa-plus-circle"></i> SUBMIT
        </button>
      </div>

    </form>
    <hr>
    <button onclick="closeModal()">Close</button>
  </th:block>

</body>

</html>

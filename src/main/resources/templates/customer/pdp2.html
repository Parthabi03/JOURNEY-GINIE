<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Package - Destination Name</title>
    <link rel="stylesheet" href="/style/pdp2.css">
    <script src="https://kit.fontawesome.com/your-fontawesome-kit.js" crossorigin="anonymous"></script>
</head>
<body>
    <header class="header">
        <h1>JOURNEY-GINIE</h1>
    </header>
    
    <main class="pdp-container">
        <section class="tour-details">
            <img src="destination1.jpg" alt="Beautiful Bali Escape" class="tour-image">
            <h2>Beautiful Bali Escape</h2>
            <p><i class="fas fa-map-marker-alt"></i> Bali, Indonesia</p>
            <p><i class="fas fa-clock"></i> 7 Days / 6 Nights</p>
            <p class="price">$999 per person</p>
            <button class="book-now">Book Now</button>
        </section>
    </main>
</body>
</html>

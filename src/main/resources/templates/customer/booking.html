<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOURNEY-GINIE</title>
    <link rel="stylesheet" href="/style/booking.css">
</head>
<body>
    <header>
        <h1>JOURNEY-GINIE</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Destinations</a></li>
                <!-- <li><a href="#">Packages</a></li> -->
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="booking-form">
        <h2>Book Your Trip</h2>
        <form action="/customer/booking" method="POST">

            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
    
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
    
            <label for="destination">Enter Destination/Tour</label>
            <input type="text" id="name" name="destinationName" required>
    
            <label for="date">Travel Date:</label>
            <input type="date" id="date" name="date" required>
    
            <label for="guests">Number of Guests:</label>
            <input type="number" id="guests" name="guests" min="1" required>

            <label for="total_price">Total Price:</label>
            <input type="number" id="total_price" name="totalPrice" required>

            <label for="status">Status:</label>
             <select id="status" name="status" required>
             <option value="PENDING">Pending</option>
             <option value="CONFIRMED">Confirmed</option>
             <option value="CANCELLED">Cancelled</option>
        </select>
    
            <h3>Select Payment Method:</h3>
            <div class="payment-options">
                <label>
                    <input type="radio" name="payment_method" value="credit_card" required> Credit/Debit Card
                </label>
                <label>
                    <input type="radio" name="payment_method" value="paypal"> PayPal
                </label>
                <label>
                    <input type="radio" name="payment_method" value="upi"> UPI
                </label>
            </div>

            <a href="/customer/success">
                <input type="hidden" name="_csrf" data-th-value="${_csrf.token}">
            <button type="submit">Proceed to Pay</button>
            </a>
        </form>

    </section>
    
    <footer>
        <p>&copy; 2025 Travel & Tour. All rights reserved.</p>
    </footer>
